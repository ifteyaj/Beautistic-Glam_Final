
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beautistic Glam | Premium Beauty & Skincare</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23C24458'/%3E%3Ctext x='50' y='65' font-size='40' text-anchor='middle' fill='white' font-family='serif'%3EB%3C/text%3E%3C/svg%3E">

    <!-- SEO Meta Tags -->
    <meta name="description" content="Beautistic Glam - Your destination for premium beauty and skincare products. Discover luxurious cosmetics, skincare essentials, and beauty accessories.">
    <meta name="keywords" content="beauty, skincare, cosmetics, makeup, premium beauty, skincare products">
    <meta name="author" content="Beautistic Glam">
    <meta property="og:title" content="Beautistic Glam | Premium Beauty & Skincare">
    <meta property="og:description" content="Discover luxurious cosmetics and skincare essentials at Beautistic Glam.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://beautistic-glam.com">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Google Fonts: Manrope for body text -->
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* Recline Font Face - Headers */
        @font-face {
            font-family: 'Recline';
            src: url('/fonts/ReclineLightDemo-jEnOM.ttf') format('truetype');
            font-weight: 300;
            font-style: normal;
        }

        /* Global Typography and Color Overrides */
        :root {
            --font-primary: 'Recline', sans-serif;
            --font-secondary: 'Manrope', sans-serif;
            --brand-radius: 5px;
            /* Luxury feminine red/pink */
            --brand-color: #C24458;
            --brand-color-hover: #A33648;
        }

        body {
            font-family: var(--font-secondary);
            background-color: #FAF9F6;
            color: #1c1917;
            -webkit-font-smoothing: antialiased;
            /* Decrease spacing of secondary font as requested */
            letter-spacing: -0.015em;
        }
        
        /* Apply Recline to all headings and brand elements */
        h1, h2, h3, h4, h5, h6, .font-serif {
            font-family: var(--font-primary) !important;
            font-weight: 300; 
            letter-spacing: 0em;
        }

        /* Specifically for the Logo */
        .brand-logo {
            font-family: var(--font-primary) !important;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            font-weight: 300;
        }

        /* Global Rounding for all "boxes" */
        button, input, select, textarea, .rounded-box {
            border-radius: var(--brand-radius) !important;
        }

        /* Custom scrollbar with brand color */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #FAF9F6;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--brand-color);
            opacity: 0.5;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--brand-color-hover);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeIn {
            animation: fadeIn 0.6s ease-out forwards;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-slideDown {
            animation: slideDown 0.3s ease-out forwards;
        }

        .font-serif {
            font-family: var(--font-primary) !important;
        }

        /* Brand Utility Classes */
        .bg-brand { background-color: var(--brand-color); }
        .bg-brand-hover:hover { background-color: var(--brand-color-hover); }
        .text-brand { color: var(--brand-color); }
        .border-brand { border-color: var(--brand-color); }
    </style>


</head>
<body>
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
